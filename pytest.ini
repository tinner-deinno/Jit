[pytest]
# JIT-014: Pytest configuration and test runner setup
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*
addopts =
    -v
    --tb=short
    --cov=organs
    --cov=limbs
    --cov=network
    --cov=core
    --cov=mind
    --cov=memory
    --cov-report=term-missing
    --cov-report=html:reports/coverage
    --cov-fail-under=60
asyncio_mode = auto
