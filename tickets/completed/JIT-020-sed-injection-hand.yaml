## Summary

The `organs/hand.sh` edit command (line 46) uses sed with unquoted variables taken from user input:
```bash
sed -i "s|$OLD|$NEW|g" "$FILE"
```

Because `$OLD` and `$NEW` are not escaped, a user can inject sed commands or regex metacharacters, allowing arbitrary text replacement patterns or even sed address ranges to be injected.

## Impact

- User-supplied `$OLD` value like `|s|/etc/passwd||` becomes part of sed expression, executing unintended commands
- Attacker can craft `$OLD`/`$NEW` to modify unintended files or inject shell escapes
- Risk of data corruption or information disclosure

## Affected Lines

- **organs/hand.sh:46** — `sed -i "s|$OLD|$NEW|g" "$FILE"` with unquoted variables

## Fix Strategy

Use parameter expansion for escaping, or use Perl/awk:
```bash
# Option 1: Escape for sed
OLD_ESC=$(printf '%s\n' "$OLD" | sed -e 's/[\/&]/\\&/g')
NEW_ESC=$(printf '%s\n' "$NEW" | sed -e 's/[\/&]/\\&/g')
sed -i "s|$OLD_ESC|$NEW_ESC|g" "$FILE"

# Option 2: Use a proper tool like perl
perl -i -pe "s/\Q$OLD\E/$NEW/g" "$FILE"
```
