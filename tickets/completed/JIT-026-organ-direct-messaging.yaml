acceptance:
  - New protocol: organs/ can call each other directly via named pipes (/tmp/manusat-pipes/<organ1>--<organ2>)
  - hand.sh and leg.sh can coordinate without involving heart.sh (e.g. synchronized actions)
  - Fallback to bus.sh if direct channel unavailable
  - Each organ-pair channel has its own message queue (max 100 pending)
  - bus.sh stats reports direct-channel utilization
