acceptance:
  - Add optional `expires-at:<ISO-8601>` (or `ttl:<seconds>`) header to message format in protocol.md
  - bus.sh `send` stamps the header automatically; default TTL is configurable (e.g. 1h for task, 24h for broadcast)
  - bus.sh `flush` (or new `sweep` subcommand) moves expired `.msg` files to a `.expired` quarantine, never silently deletes
