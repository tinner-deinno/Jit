implementation_notes: |
  **limbs/oracle.sh** already implements vector search capabilities:

  - `--semantic` / `-s` flag: Uses vector mode for semantic search
  - `--keyword` / `-k` flag: Uses FTS5 keyword-only search
  - `--hybrid` / `-h` flag: Combines both (default)
  - `--model <name>`: Supports bge-m3, nomic, qwen3 embedding models

  **Verified working:**
  - Keyword search (FTS5): ✅ Working
  - Hybrid search: ✅ Implemented (falls back to FTS5 when vector unavailable)
  - Semantic search: ✅ Command implemented, requires Ollama embedding model configuration

  **Configuration note:**
  Vector embeddings require Ollama embedding model to be configured in Arra Oracle V3 server.
  The oracle.sh CLI supports all modes; server-side embedding config is in arra-oracle-v3 repo.
