<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>� จิต — มนุษย์ Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --purple: #bc8cff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
                   "Noto Sans Thai", "Sarabun", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 1.5rem;
    }

    .header { text-align: center; }
    .header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em; }
    .header p { color: var(--text-dim); font-size: 0.9rem; margin-top: 0.3rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 520px;
    }

    .lang-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .lang-btn {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.15s;
    }
    .lang-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .mic-wrap {
      display: flex;
      justify-content: center;
      margin: 1rem 0;
    }
    #micBtn {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      position: relative;
    }
    #micBtn:hover { border-color: var(--accent); transform: scale(1.05); }
    #micBtn.recording {
      border-color: var(--red);
      background: rgba(248, 81, 73, 0.1);
      animation: pulse 1.2s ease-in-out infinite;
    }
    #micBtn.recording::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid var(--red);
      animation: ripple 1.2s ease-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.4); }
      50%       { box-shadow: 0 0 0 16px rgba(248, 81, 73, 0); }
    }
    @keyframes ripple {
      0%   { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    .mic-label {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 0.5rem;
    }
    .mic-label.recording { color: var(--red); }

    .transcript-section { margin-top: 1rem; }
    .transcript-section label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }
    .transcript-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      min-height: 3.5rem;
      font-size: 1.05rem;
      line-height: 1.6;
      word-break: break-word;
    }
    #interimBox { color: var(--text-dim); font-style: italic; }
    #finalBox   { color: var(--text); }

    #statusBox {
      margin-top: 1rem;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      border: 1px solid var(--border);
      min-height: 2.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .status-ok     { border-color: var(--green); background: rgba(63, 185, 80, 0.08); color: var(--green); }
    .status-error  { border-color: var(--red);   background: rgba(248, 81, 73, 0.08); color: var(--red); }
    .status-info   { border-color: var(--border); color: var(--text-dim); }
    .status-warn   { border-color: var(--yellow); background: rgba(210, 153, 34, 0.08); color: var(--yellow); }

    .pane-info {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-align: center;
      margin-top: 1rem;
    }
    .pane-info code {
      background: var(--bg);
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      font-family: "Fira Code", "Consolas", monospace;
      color: var(--purple);
    }

    .actions {
      display: flex;
      justify-content: center;
      margin-top: 1rem;
    }
    .clear-btn {
      padding: 0.35rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.8rem;
    }
    .clear-btn:hover { border-color: var(--text-dim); color: var(--text); }

    #errorBanner {
      display: none;
      width: 100%;
      max-width: 520px;
      padding: 1rem;
      border-radius: 8px;
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid var(--red);
      color: var(--red);
      text-align: center;
    }

    /* ── Jit Command Center additions ── */
    .sub { color:var(--text-dim);font-size:.85rem;margin-top:.3rem;display:flex;align-items:center;justify-content:center;gap:.5rem }
    .status-dot { width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;transition:background .4s }
    .status-dot.alive { background:var(--green);animation:pulse-dot 2s ease-in-out infinite }
    @keyframes pulse-dot { 0%,100%{box-shadow:0 0 0 0 rgba(63,185,80,.4)} 50%{box-shadow:0 0 0 5px rgba(63,185,80,0)} }
    .error-banner { display:none;width:100%;max-width:580px;padding:.9rem 1rem;border-radius:8px;background:rgba(248,81,73,.1);border:1px solid var(--red);color:var(--red);font-size:.875rem }
    .card-title { font-size:.73rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem }
    .toggles { display:flex;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap }
    .toggle-label { display:flex;align-items:center;gap:.4rem;cursor:pointer;font-size:.82rem;color:var(--text-dim);user-select:none }
    .toggle-label input[type=checkbox] { display:none }
    .toggle-pill { width:36px;height:20px;background:var(--border);border-radius:10px;position:relative;transition:background .2s;flex-shrink:0 }
    .toggle-pill::after { content:'';position:absolute;left:2px;top:2px;width:16px;height:16px;border-radius:50%;background:var(--text-dim);transition:transform .2s,background .2s }
    .toggle-label input:checked + .toggle-pill { background:var(--accent) }
    .toggle-label input:checked + .toggle-pill::after { transform:translateX(16px);background:#fff }
    #micBtn.processing { border-color:var(--yellow);background:rgba(210,153,34,.1) }
    .wake-hint { text-align:center;font-size:.75rem;color:var(--text-dim);margin-top:.3rem }
    .action-badge { display:inline-block;padding:.2rem .7rem;border-radius:12px;font-size:.75rem;font-weight:600;background:rgba(88,166,255,.15);color:var(--accent);border:1px solid rgba(88,166,255,.3) }
    .stat-val { font-size:1.5rem;font-weight:700;color:var(--accent);line-height:1.2 }
    .stat-lbl { font-size:.7rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;margin-top:.2rem }
    .organ-chip { padding:.18rem .6rem;border-radius:10px;font-size:.72rem;border:1px solid var(--green);color:var(--green);background:rgba(63,185,80,.08) }
    .h-in  { color:var(--text-dim);font-size:.82rem }
    .h-out { color:#39d4b5;font-size:.82rem;margin-top:.2rem }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>🌀 จิต</h1>
    <div class="sub">
      <div class="status-dot" id="lifeDot"></div>
      <span id="lifeStatus">มนุษย์ Agent — กำลังเชื่อมต่อ...</span>
    </div>
  </div>

  <div class="error-banner" id="errBanner"></div>

  <!-- Voice Card -->
  <div class="card" style="max-width:580px">
    <div class="card-title">🎤 Voice Command</div>
    <div class="toggles">
      <label class="toggle-label">
        <input type="checkbox" id="wakeModeChk">
        <span class="toggle-pill"></span>
        Wake word <span style="color:var(--purple)">จิต</span>
      </label>
      <label class="toggle-label">
        <input type="checkbox" id="ttsChk" checked>
        <span class="toggle-pill"></span>
        🔊 Auto TTS
      </label>
      <label class="toggle-label">
        <input type="checkbox" id="continuousChk" checked>
        <span class="toggle-pill"></span>
        Continuous
      </label>
    </div>
    <div class="mic-wrap">
      <button id="micBtn" title="Space = toggle">🎤</button>
    </div>
    <div class="mic-label" id="micLabel">กดปุ่มเพื่อเริ่มฟัง</div>
    <div class="wake-hint" id="wakeHint" style="display:none">พูดว่า <span style="color:var(--purple)">&quot;จิต + คำสั่ง&quot;</span> เพื่อส่งอัตโนมัติ</div>
    <div class="transcript-section">
      <label>กำลังฟัง (real-time):</label>
      <div class="transcript-box" id="interimBox" style="color:var(--text-dim);font-style:italic">—</div>
    </div>
    <div class="transcript-section">
      <label>คำสั่งที่รับ:</label>
      <div class="transcript-box" id="finalBox">—</div>
    </div>
    <div class="transcript-section">
      <label>จิต ตอบกลับ:</label>
      <div id="actionBadgeWrap" style="margin-bottom:.4rem"></div>
      <div class="transcript-box" id="responseBox" style="color:#39d4b5;background:rgba(57,212,181,.04);border-color:rgba(57,212,181,.3)">—</div>
    </div>
    <div class="actions">
      <button class="clear-btn" id="clearBtn">🗑 ล้างข้อความ</button>
    </div>
  </div>

  <!-- History -->
  <div class="card" style="max-width:580px">
    <div class="card-title">📜 ประวัติคำสั่ง</div>
    <ul id="historyList" style="list-style:none;max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:.5rem">
      <li><span class="h-in">ยังไม่มีคำสั่ง...</span></li>
    </ul>
  </div>

  <!-- Monitor -->
  <div class="card" style="max-width:580px">
    <div class="card-title">📊 Life Loop Monitor <span id="monDot" style="margin-left:auto;width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block"></span></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1rem">
      <div id="mCycle"  style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.6rem .75rem;text-align:center"><div class="stat-val">—</div><div class="stat-lbl">Cycle</div></div>
      <div id="mDone"   style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.6rem .75rem;text-align:center"><div class="stat-val">—</div><div class="stat-lbl">Organs</div></div>
      <div id="mAlerts" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.6rem .75rem;text-align:center"><div class="stat-val">—</div><div class="stat-lbl">Alerts</div></div>
    </div>
    <div id="organsWrap" style="display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.75rem"></div>
    <div id="monStatus" style="font-size:.8rem;color:var(--text-dim)">รอ Life Loop เริ่ม — รัน: bash scripts/start-jit.sh</div>
  </div>

  <script>
  // ────────────────────────────────────────────────────────────────
  // TTS — Thai female voice (Microsoft Premwadee on Windows)
  // ────────────────────────────────────────────────────────────────
  let _voices = []
  const _loadVoices = () => { _voices = window.speechSynthesis?.getVoices() || [] }
  _loadVoices()
  if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged = _loadVoices

  function pickThaiVoice() {
    return _voices.find(v => v.name.includes('Premwadee'))
        || _voices.find(v => v.lang === 'th-TH' && /female|woman/i.test(v.name))
        || _voices.find(v => v.lang === 'th-TH')
        || _voices.find(v => v.lang.startsWith('th'))
        || null
  }

  function speak(text) {
    if (!document.getElementById('ttsChk').checked) return
    if (!window.speechSynthesis || !text) return
    window.speechSynthesis.cancel()
    const utt = new SpeechSynthesisUtterance(text)
    const v = pickThaiVoice()
    if (v) utt.voice = v
    utt.lang = 'th-TH'; utt.rate = 1.05; utt.pitch = 1.15
    window.speechSynthesis.speak(utt)
  }

  // ────────────────────────────────────────────────────────────────
  // Speech Recognition
  // ────────────────────────────────────────────────────────────────
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition
  if (!SR) {
    const b = document.getElementById('errBanner')
    b.style.display = 'block'
    b.textContent = '❌ บราวเซอร์นี้ไม่รองรับ Web Speech API — กรุณาใช้ Chrome หรือ Edge'
  }

  const rec = SR ? new SR() : null
  let isRec = false

  if (rec) {
    rec.lang = 'th-TH'
    rec.maxAlternatives = 1
    rec.interimResults = true
    rec.continuous = true
  }

  const $ = id => document.getElementById(id)
  const micBtn   = $('micBtn')
  const micLabel = $('micLabel')
  const interimB = $('interimBox')
  const finalBox = $('finalBox')
  const respBox  = $('responseBox')
  const badgeW   = $('actionBadgeWrap')
  const wakeHint = $('wakeHint')

  $('wakeModeChk').addEventListener('change', function() {
    wakeHint.style.display = this.checked ? 'block' : 'none'
  })
  $('continuousChk').addEventListener('change', function() {
    if (rec) rec.continuous = this.checked
  })

  micBtn.addEventListener('click', () => { if (rec) isRec ? stopRec() : startRec() })

  function startRec() {
    rec.continuous = $('continuousChk').checked
    rec.start()
    isRec = true
    micBtn.classList.add('recording')
    micBtn.textContent = '⏸'
    micLabel.textContent = 'กำลังฟัง...'
    micLabel.classList.add('recording')
  }

  function stopRec() {
    rec.stop()
    isRec = false
    micBtn.classList.remove('recording', 'processing')
    micBtn.textContent = '🎤'
    micLabel.textContent = 'กดปุ่มเพื่อเริ่มฟัง'
    micLabel.classList.remove('recording')
    interimB.textContent = '—'
  }

  if (rec) {
    rec.onresult = event => {
      let interim = '', final = ''
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const t = event.results[i][0].transcript
        event.results[i].isFinal ? (final += t) : (interim += t)
      }
      if (interim) interimB.textContent = interim
      if (final.trim()) {
        interimB.textContent = '—'
        finalBox.textContent = final.trim()
        const wakeMode = $('wakeModeChk').checked
        if (!wakeMode || /จิต/.test(final)) sendCommand(final.trim())
      }
    }
    rec.onend = () => {
      if (isRec) setTimeout(() => { if (isRec) { try { rec.start() } catch(e){} } }, 200)
    }
    rec.onerror = event => {
      if (['no-speech','audio-capture'].includes(event.error)) return
      if (event.error === 'not-allowed') { stopRec(); showErr('❌ ไม่ได้รับอนุญาตใช้ไมค์') }
    }
  }

  // ────────────────────────────────────────────────────────────────
  // Send voice command to /command endpoint
  // ────────────────────────────────────────────────────────────────
  async function sendCommand(text) {
    micBtn.classList.remove('recording')
    micBtn.classList.add('processing')
    micBtn.textContent = '⏳'
    micLabel.textContent = 'กำลังประมวลผล...'
    micLabel.classList.remove('recording')
    badgeW.innerHTML = ''
    respBox.textContent = '...'

    try {
      const resp = await fetch('/command', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      })
      const data = await resp.json()
      if (!data.ok) {
        respBox.textContent = `❌ ${data.error || 'เกิดข้อผิดพลาด'}`
        respBox.style.color = 'var(--red)'
        console.error('[cmd] server error:', data.error)
        return
      }
      respBox.style.color = ''
      const action = data.action || 'chat'
      const reply  = data.response_th || 'ได้ยินค่ะ'

      const badge = document.createElement('div')
      badge.className = 'action-badge'
      badge.textContent = actionLabel(action)
      badgeW.appendChild(badge)

      respBox.textContent = reply
      speak(reply)
      addHistory(text, reply, action)
    } catch(err) {
      respBox.textContent = 'ขอโทษค่ะ เกิดข้อผิดพลาด'
      console.error('[cmd]', err)
    } finally {
      micBtn.classList.remove('processing')
      if (isRec) {
        micBtn.classList.add('recording')
        micBtn.textContent = '⏸'
        micLabel.textContent = 'กำลังฟัง...'
        micLabel.classList.add('recording')
      } else {
        micBtn.textContent = '🎤'
        micLabel.textContent = 'กดปุ่มเพื่อเริ่มฟัง'
      }
    }
  }

  function actionLabel(a) {
    return { search_youtube:'▶ YouTube', open_url:'🌐 เปิดเว็บ', search_web:'🔍 ค้นหา',
             tell_time:'🕐 เวลา', tell_date:'📅 วันที่', system_status:'📊 สถานะ',
             chat:'💬 สนทนา' }[a] || a
  }

  // ────────────────────────────────────────────────────────────────
  // History
  // ────────────────────────────────────────────────────────────────
  const histList = $('historyList')
  function addHistory(cmd, reply, action) {
    const li = document.createElement('li')
    li.style.cssText = 'background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.5rem .75rem'
    li.innerHTML = `<div class="h-in">👤 ${esc(cmd.substring(0,90))}</div>
                    <div class="h-out">🌀 [${actionLabel(action)}] ${esc(reply.substring(0,130))}</div>`
    if (histList.firstChild?.querySelector?.('.h-in')?.textContent?.includes('ยังไม่มี')) histList.innerHTML = ''
    histList.insertBefore(li, histList.firstChild)
    if (histList.children.length > 8) histList.removeChild(histList.lastChild)
  }

  $('clearBtn').addEventListener('click', () => {
    interimB.textContent = '—'; finalBox.textContent = '—'; respBox.textContent = '—'
    badgeW.innerHTML = ''
  })

  function esc(s) { return s.replace(/</g,'&lt;').replace(/>/g,'&gt;') }
  function showErr(msg) {
    const b = $('errBanner'); b.style.display = 'block'; b.textContent = msg
    setTimeout(() => b.style.display='none', 5000)
  }

  // ────────────────────────────────────────────────────────────────
  // Life Loop Monitor — SSE /monitor
  // ────────────────────────────────────────────────────────────────
  function connectMonitor() {
    const es = new EventSource('/monitor')
    const monDot  = $('monDot')
    const lifeDot = $('lifeDot')
    const lifeSt  = $('lifeStatus')
    const monStatus = $('monStatus')
    const orgWrap = $('organsWrap')

    es.onopen = () => { monDot.style.background = 'var(--green)' }

    es.onmessage = event => {
      try {
        const d = JSON.parse(event.data)
        if (d.status === 'connected') return

        if (d.status === 'waiting') {
          monDot.style.background = 'var(--yellow)'
          lifeDot.style.background = 'var(--red)'
          lifeSt.textContent = 'Life Loop ยังไม่เริ่ม'
          monStatus.textContent = 'รอ Life Loop — รัน: bash scripts/start-jit.sh'
          return
        }

        monDot.style.background = 'var(--green)'
        lifeDot.style.background = 'var(--green)'
        const alerts = d.alert_count || 0

        $('mCycle').querySelector('.stat-val').textContent  = '#' + (d.cycle || 0)
        $('mDone').querySelector('.stat-val').textContent   = d.organs_done || 0
        $('mAlerts').querySelector('.stat-val').textContent = alerts

        $('mDone').querySelector('.stat-val').style.color   = d.organs_done > 0 ? 'var(--green)' : 'var(--accent)'
        $('mAlerts').querySelector('.stat-val').style.color = alerts > 0 ? 'var(--yellow)' : 'var(--green)'

        lifeSt.textContent = `Cycle #${d.cycle} · ${d.organs_done} organs done · ${alerts} alerts`

        // Organ chips
        orgWrap.innerHTML = ''
        ;(d.organs || '').split(',').map(o => o.trim()).filter(Boolean).forEach(o => {
          const chip = document.createElement('span')
          chip.className = 'organ-chip'
          chip.textContent = o
          orgWrap.appendChild(chip)
        })

        // Blood details
        const rows = (d.blood || []).map(b => {
          const f = (b.findings || []).slice(0,3).join(' · ')
          const a = (b.alerts || []).join(' ⚠ ')
          const col = b.status === 'done' ? 'var(--green)' : 'var(--red)'
          return `<div style="padding:.3rem 0;border-bottom:1px solid var(--border);font-size:.78rem;display:grid;grid-template-columns:70px 60px 50px 1fr 1fr">
            <span><strong>${esc(b.organ||'?')}</strong></span>
            <span style="color:var(--text-dim)">${esc(b.task||'')}</span>
            <span style="color:${col}">${esc(b.status||'')}</span>
            <span style="color:var(--text-dim)">${esc(f)}</span>
            <span style="color:var(--yellow)">${esc(a)}</span>
          </div>`
        }).join('')

        monStatus.innerHTML = rows || '<span style="color:var(--text-dim)">ไม่มีข้อมูล blood</span>'

        if (d.ts) {
          const ts = new Date(d.ts).toLocaleTimeString('th-TH')
          monStatus.innerHTML += `<div style="font-size:.7rem;color:var(--text-dim);text-align:right;margin-top:.3rem">อัปเดต ${ts}</div>`
        }
      } catch(e) { console.warn('[monitor]', e) }
    }

    es.onerror = () => {
      monDot.style.background = 'var(--red)'
      setTimeout(() => { es.close(); connectMonitor() }, 10000)
    }
  }

  connectMonitor()

  // Space bar shortcut
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target.tagName !== 'INPUT') { e.preventDefault(); micBtn.click() }
  })
  </script>
</body>
</html>
