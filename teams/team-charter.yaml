        action: "notify human"

  design_flow:
    name: "Design Flow"
    description: "UI/UX design from concept to implementation"
    steps:
      - step: 1
        agent: vaja
        action: "translate human need to rupa"
      - step: 2
        agent: rupa
        action: "wireframe → hi-fi spec"
      - step: 3
        agent: soma
        action: "approve design"
      - step: 4
        agent: innova
        action: "implement"
      - step: 5
        agent: rupa
        action: "visual review"

  health_flow:
    name: "System Health / Monitoring Flow"
    description: "Vital sign collection and alert propagation"
    steps:
      - step: 1
        agent: pran
        action: "collect heartbeats from all agents"
      - step: 2
        agent: netra
        action: "observe system + environment"
      - step: 3
        agent: karn
        action: "listen for incoming signals"
      - step: 4
        agent: jit
        action: "synthesize health state"
      - step: 5
        agent: sayanprasathan
        action: "broadcast alerts if degraded"
      - step: 6
