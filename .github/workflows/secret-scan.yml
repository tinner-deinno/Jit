name: secret-scan
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
  id-token: write
  pull-requests: write
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # uncomment if you have a license
  block-env-files:
    runs-on: ubuntu-latest
    steps:
      - name: Check for real .env files
        run: |
          # Fail if any .env file exists except .env.example
          if git ls-files '*.env' | grep -v '^\.env\.example$' | grep .; then
            echo "Error: Real .env files detected. Only .env.example is allowed."
            exit 1
          fi
  verify-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Warn if referenced .ts/.js/.md paths do not exist
        run: |
          echo "Checking for references to .ts/.js/.md files that do not exist..."
          # Gather all existing files of interest
          existing_files=$(git ls-files '*.ts' '*.js' '*.md' | sort -u)
          # Find potential file references in tracked sources (exclude node_modules)
          refs=$(git grep --cached -oP '\b[\w.-]+/[\w./-]*\.(ts|js|md)\b' | grep -v node_modules | sed 's/.*://' | sort -u) || true
          warnings=0
          while IFS= read -r ref; do
            [ -z "$ref" ] && continue
            # Skip absolute paths
            if [[ "$ref" =~ ^/ ]]; then
              continue
            fi
            # Remove leading '.' if relative
            ref_clean="${ref#./}"
            if ! echo "$existing_files" | grep -Fxq "$ref_clean"; then
              echo "::warning::Referenced file not found: $ref_clean"
              warnings=$((warnings+1))
            fi
          done <<< "$refs"
          echo "Scan complete. Warnings issued: $warnings"
          exit 0  # always succeed, only warn